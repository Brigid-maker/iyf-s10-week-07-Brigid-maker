<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task 13.2 — Persistent To-Do List</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --border: #2e2e42;
    --text: #e8e8f0;
    --muted: #5a5a78;
    --green: #00e5a0;
    --red: #ff4d6d;
    --yellow: #ffd166;
    --blue: #6c8bef;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 32px 40px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .logo {
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: -1px;
  }

  .logo span { color: var(--green); }

  .stats {
    display: flex;
    gap: 24px;
    font-family: 'Syne Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .stat strong {
    display: block;
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 24px;
    width: 100%;
    flex: 1;
  }

  .input-row {
    display: flex;
    gap: 0;
    margin-bottom: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }

  .input-row:focus-within { border-color: var(--green); }

  .input-row input {
    flex: 1;
    background: none;
    border: none;
    padding: 16px 20px;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    outline: none;
  }

  .input-row input::placeholder { color: var(--muted); }

  .btn-add {
    background: var(--green);
    color: var(--bg);
    border: none;
    padding: 16px 28px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-add:hover { opacity: 0.85; }

  .filters {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    background: var(--surface);
    padding: 4px;
    border: 1px solid var(--border);
    width: fit-content;
  }

  .filter-btn {
    background: none;
    border: none;
    color: var(--muted);
    padding: 8px 18px;
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .filter-btn.active {
    background: var(--green);
    color: var(--bg);
  }

  .todo-list { display: flex; flex-direction: column; gap: 8px; }

  .todo-item {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px 20px;
    transition: all 0.2s;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .todo-item:hover { border-color: var(--muted); }
  .todo-item.done { opacity: 0.5; }

  .checkbox {
    width: 22px; height: 22px;
    border: 2px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .todo-item.done .checkbox {
    background: var(--green);
    border-color: var(--green);
  }

  .checkbox::after {
    content: '';
    width: 6px; height: 10px;
    border-right: 2px solid var(--bg);
    border-bottom: 2px solid var(--bg);
    transform: rotate(45deg) translate(-1px,-1px);
    opacity: 0;
    transition: opacity 0.1s;
  }

  .todo-item.done .checkbox::after { opacity: 1; }

  .todo-text {
    flex: 1;
    font-size: 0.95rem;
    line-height: 1.4;
    transition: text-decoration 0.2s;
  }

  .todo-item.done .todo-text { text-decoration: line-through; }

  .todo-meta {
    font-family: 'Syne Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    flex-shrink: 0;
  }

  .btn-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 8px;
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s;
    flex-shrink: 0;
  }

  .btn-del:hover { color: var(--red); }

  .empty {
    text-align: center;
    padding: 80px 0;
    color: var(--muted);
  }

  .empty .icon { font-size: 3rem; margin-bottom: 16px; }
  .empty p { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
  .empty small { font-family: 'Syne Mono', monospace; font-size: 0.75rem; }

  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0 0;
    margin-top: 24px;
    border-top: 1px solid var(--border);
    font-family: 'Syne Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .btn-clear-done {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Syne Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    transition: color 0.15s;
  }

  .btn-clear-done:hover { color: var(--red); }

  .progress-bar {
    height: 3px;
    background: var(--border);
    margin-bottom: 32px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--blue));
    transition: width 0.4s ease;
  }
</style>
</head>
<body>

<header>
  <div class="logo">do<span>·</span>it</div>
  <div class="stats">
    <div class="stat">
      <strong id="statTotal">0</strong>
      total
    </div>
    <div class="stat">
      <strong id="statDone">0</strong>
      done
    </div>
    <div class="stat">
      <strong id="statLeft">0</strong>
      left
    </div>
  </div>
</header>

<div class="container">
  <div class="input-row">
    <input type="text" id="todoInput" placeholder="What needs to be done?" maxlength="120">
    <button class="btn-add" onclick="addTodo()">ADD</button>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
    <button class="filter-btn" data-filter="active" onclick="setFilter('active')">Active</button>
    <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">Done</button>
  </div>

  <div class="todo-list" id="todoList"></div>

  <div class="bottom-bar">
    <span id="bottomMsg">persisted to localStorage</span>
    <button class="btn-clear-done" onclick="clearCompleted()">Clear completed</button>
  </div>
</div>

<script>
  // ─── Storage Helpers ──────────────────────────────────────────────
  function saveToStorage(key, data) {
    localStorage.setItem(key, JSON.stringify(data));
  }

  function getFromStorage(key, defaultValue = null) {
    const data = localStorage.getItem(key);
    return data ? JSON.parse(data) : defaultValue;
  }

  // ─── State ────────────────────────────────────────────────────────
  const TODOS_KEY = 'lesson13_todos';
  const FILTER_KEY = 'lesson13_filter';
  let currentFilter = getFromStorage(FILTER_KEY, 'all');

  function loadTodos() {
    return getFromStorage(TODOS_KEY, []);
  }

  function saveTodos(todos) {
    saveToStorage(TODOS_KEY, todos);
  }

  // ─── CRUD ─────────────────────────────────────────────────────────
  function addTodo() {
    const input = document.getElementById('todoInput');
    const text = input.value.trim();
    if (!text) return;

    const newTodo = {
      id: Date.now(),
      text,
      completed: false,
      createdAt: new Date().toISOString()
    };

    const todos = loadTodos();
    todos.push(newTodo);
    saveTodos(todos);

    input.value = '';
    renderTodos();
  }

  function toggleTodo(id) {
    const todos = loadTodos();
    const todo = todos.find(t => t.id === id);
    if (todo) {
      todo.completed = !todo.completed;
      saveTodos(todos);
      renderTodos();
    }
  }

  function deleteTodo(id) {
    let todos = loadTodos();
    todos = todos.filter(t => t.id !== id);
    saveTodos(todos);
    renderTodos();
  }

  function clearCompleted() {
    let todos = loadTodos().filter(t => !t.completed);
    saveTodos(todos);
    renderTodos();
  }

  function setFilter(filter) {
    currentFilter = filter;
    saveToStorage(FILTER_KEY, filter);

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === filter);
    });

    renderTodos();
  }

  // ─── Render ───────────────────────────────────────────────────────
  function getFilteredTodos(todos) {
    if (currentFilter === 'active')    return todos.filter(t => !t.completed);
    if (currentFilter === 'completed') return todos.filter(t => t.completed);
    return todos;
  }

  function timeAgo(iso) {
    const diff = Date.now() - new Date(iso);
    const mins = Math.floor(diff / 60000);
    if (mins < 1)  return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24)  return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  function renderTodos() {
    const allTodos = loadTodos();
    const filtered = getFilteredTodos(allTodos);
    const list = document.getElementById('todoList');

    // Update stats
    const done = allTodos.filter(t => t.completed).length;
    document.getElementById('statTotal').textContent = allTodos.length;
    document.getElementById('statDone').textContent = done;
    document.getElementById('statLeft').textContent = allTodos.length - done;

    // Progress bar
    const pct = allTodos.length ? Math.round((done / allTodos.length) * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';

    if (!filtered.length) {
      list.innerHTML = `
        <div class="empty">
          <div class="icon">✓</div>
          <p>${currentFilter === 'completed' ? 'Nothing completed yet' : 'All clear!'}</p>
          <small>${currentFilter === 'all' ? 'Add a task above to get started' : 'Switch filter to see tasks'}</small>
        </div>`;
      return;
    }

    list.innerHTML = filtered.map(todo => `
      <div class="todo-item ${todo.completed ? 'done' : ''}" id="todo-${todo.id}">
        <div class="checkbox" onclick="toggleTodo(${todo.id})"></div>
        <span class="todo-text">${escapeHtml(todo.text)}</span>
        <span class="todo-meta">${timeAgo(todo.createdAt)}</span>
        <button class="btn-del" onclick="deleteTodo(${todo.id})" title="Delete">×</button>
      </div>
    `).join('');
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ─── Events ───────────────────────────────────────────────────────
  document.getElementById('todoInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });

  // ─── Init ─────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    // Restore active filter button
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === currentFilter);
    });
    renderTodos();
  });
</script>
</body>
</html>
