<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task 13.1 — Notes App</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --accent: #c84b31;
    --muted: #8a7f72;
    --line: #d4cfc5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(
        transparent,
        transparent 31px,
        var(--line) 31px,
        var(--line) 32px
      );
    background-position: 0 64px;
  }

  header {
    background: var(--ink);
    color: var(--paper);
    padding: 24px 40px;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    letter-spacing: -0.5px;
  }

  header span {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  .compose-area {
    background: white;
    border-left: 4px solid var(--accent);
    box-shadow: 4px 4px 0 var(--ink);
    margin-bottom: 48px;
    position: relative;
  }

  .compose-area textarea {
    width: 100%;
    min-height: 120px;
    border: none;
    padding: 20px;
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    line-height: 2;
    resize: vertical;
    background: transparent;
    outline: none;
    color: var(--ink);
  }

  .compose-area textarea::placeholder {
    color: var(--muted);
    font-style: italic;
  }

  .compose-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    border-top: 1px solid var(--line);
    background: var(--cream);
  }

  .char-count {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .btn-add {
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-add:hover {
    background: var(--ink);
    transform: translate(-2px, -2px);
    box-shadow: 2px 2px 0 var(--accent);
  }

  .btn-add:active { transform: none; box-shadow: none; }

  .notes-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .notes-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-style: italic;
    color: var(--muted);
  }

  .btn-clear-all {
    background: none;
    border: 1px solid var(--muted);
    color: var(--muted);
    padding: 4px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-clear-all:hover { border-color: var(--accent); color: var(--accent); }

  .notes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
  }

  .note-card {
    background: white;
    padding: 20px;
    position: relative;
    box-shadow: 3px 3px 0 var(--ink);
    border-top: 3px solid var(--ink);
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .note-card::before {
    content: '';
    position: absolute;
    top: 0; left: 24px;
    width: 16px; height: 24px;
    background: var(--accent);
    clip-path: polygon(0 0, 100% 0, 100% 70%, 50% 100%, 0 70%);
  }

  .note-text {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    line-height: 1.8;
    color: var(--ink);
    margin-top: 8px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .note-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px dashed var(--line);
  }

  .note-date {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .btn-delete {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
    transition: color 0.15s;
  }

  .btn-delete:hover { color: var(--accent); }

  .empty-state {
    text-align: center;
    padding: 64px 0;
    color: var(--muted);
  }

  .empty-state p {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.2rem;
  }

  .empty-state small {
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: block;
    margin-top: 8px;
  }

  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--ink);
    color: var(--paper);
    padding: 12px 24px;
    font-size: 0.75rem;
    letter-spacing: 1px;
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.3s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header>
  <h1>My Notes</h1>
  <span>localStorage · persisted</span>
</header>

<div class="container">
  <div class="compose-area">
    <textarea id="noteInput" placeholder="Write a note…" maxlength="500"></textarea>
    <div class="compose-footer">
      <span class="char-count" id="charCount">0 / 500</span>
      <button class="btn-add" onclick="addNote()">+ Add Note</button>
    </div>
  </div>

  <div class="notes-header">
    <h2 id="notesLabel">Your notes</h2>
    <button class="btn-clear-all" onclick="clearAll()">Clear All</button>
  </div>

  <div class="notes-grid" id="notesGrid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ─── Storage Helpers ──────────────────────────────────────────────
  function saveToStorage(key, data) {
    localStorage.setItem(key, JSON.stringify(data));
  }

  function getFromStorage(key, defaultValue = null) {
    const data = localStorage.getItem(key);
    return data ? JSON.parse(data) : defaultValue;
  }

  function removeFromStorage(key) {
    localStorage.removeItem(key);
  }

  // ─── App Logic ────────────────────────────────────────────────────
  const NOTES_KEY = 'lesson13_notes';

  function loadNotes() {
    return getFromStorage(NOTES_KEY, []);
  }

  function saveNotes(notes) {
    saveToStorage(NOTES_KEY, notes);
  }

  function addNote() {
    const input = document.getElementById('noteInput');
    const text = input.value.trim();
    if (!text) { showToast('Write something first!'); return; }

    const notes = loadNotes();
    notes.unshift({
      id: Date.now(),
      text,
      createdAt: new Date().toISOString()
    });

    saveNotes(notes);
    input.value = '';
    updateCharCount();
    renderNotes();
    showToast('Note saved ✓');
  }

  function deleteNote(id) {
    let notes = loadNotes();
    notes = notes.filter(n => n.id !== id);
    saveNotes(notes);
    renderNotes();
    showToast('Note deleted');
  }

  function clearAll() {
    if (!loadNotes().length) return;
    if (confirm('Delete all notes?')) {
      removeFromStorage(NOTES_KEY);
      renderNotes();
      showToast('All notes cleared');
    }
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', {
      month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
    });
  }

  // ─── Rendering ────────────────────────────────────────────────────
  function renderNotes() {
    const notes = loadNotes();
    const grid = document.getElementById('notesGrid');
    const label = document.getElementById('notesLabel');

    label.textContent = notes.length
      ? `${notes.length} note${notes.length !== 1 ? 's' : ''} saved`
      : 'Your notes';

    if (!notes.length) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <p>No notes yet</p>
          <small>Start writing above</small>
        </div>`;
      return;
    }

    grid.innerHTML = notes.map(note => `
      <div class="note-card">
        <p class="note-text">${escapeHtml(note.text)}</p>
        <div class="note-footer">
          <span class="note-date">${formatDate(note.createdAt)}</span>
          <button class="btn-delete" onclick="deleteNote(${note.id})">delete</button>
        </div>
      </div>
    `).join('');
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ─── UI Helpers ───────────────────────────────────────────────────
  function updateCharCount() {
    const input = document.getElementById('noteInput');
    document.getElementById('charCount').textContent =
      `${input.value.length} / 500`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ─── Event Listeners ─────────────────────────────────────────────
  document.getElementById('noteInput').addEventListener('input', updateCharCount);

  document.getElementById('noteInput').addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') addNote();
  });

  // ─── Init ─────────────────────────────────────────────────────────
  renderNotes();
</script>
</body>
</html>
