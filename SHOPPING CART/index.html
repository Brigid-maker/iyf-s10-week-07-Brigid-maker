<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini-Project — Shopping Cart</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0c;
    --surface: #151515;
    --card: #1c1c1c;
    --border: #2a2a2a;
    --text: #f0ede8;
    --muted: #6b6b6b;
    --accent: #d4af6a;
    --accent-dim: rgba(212,175,106,0.12);
    --red: #ef4444;
    --green: #22c55e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────────────────────────────── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(12,12,12,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 48px;
    height: 72px;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .logo span { color: var(--accent); }

  .cart-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    position: relative;
  }

  .cart-btn:hover { border-color: var(--accent); color: var(--accent); }

  .cart-count {
    background: var(--accent);
    color: var(--bg);
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 600;
    transition: transform 0.2s;
  }

  .cart-count.bump { animation: bump 0.3s ease; }
  @keyframes bump {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.4); }
  }

  /* ── Layout ─────────────────────────────────────────────────────── */
  .layout {
    display: grid;
    grid-template-columns: 1fr 380px;
    min-height: calc(100vh - 72px);
  }

  /* ── Product Grid ────────────────────────────────────────────────── */
  .products-section {
    padding: 48px;
    border-right: 1px solid var(--border);
  }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 40px;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 300;
    letter-spacing: 1px;
  }

  .section-title em { font-style: italic; color: var(--accent); }

  .item-count {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 24px;
  }

  .product-card {
    background: var(--card);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
    cursor: default;
  }

  .product-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
  }

  .product-image {
    width: 100%;
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .product-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(212,175,106,0.05), transparent);
  }

  .product-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--accent);
    color: var(--bg);
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 10px;
  }

  .product-info { padding: 20px; }

  .product-category {
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .product-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-weight: 400;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .product-description {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .product-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .product-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--accent);
  }

  .btn-atc {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 10px 18px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-atc:hover { opacity: 0.85; transform: scale(1.03); }

  .btn-atc.in-cart {
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid var(--accent);
  }

  /* ── Cart Panel ──────────────────────────────────────────────────── */
  .cart-panel {
    display: flex;
    flex-direction: column;
    background: var(--surface);
  }

  .cart-header {
    padding: 32px 32px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .cart-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 300;
  }

  .btn-clear {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Outfit', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: color 0.15s;
  }

  .btn-clear:hover { color: var(--red); }

  .cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
  }

  .cart-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 200px;
    color: var(--muted);
    text-align: center;
    gap: 8px;
  }

  .cart-empty .icon { font-size: 2.5rem; }
  .cart-empty p { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; }
  .cart-empty small { font-size: 0.72rem; letter-spacing: 1px; }

  .cart-item {
    display: flex;
    gap: 16px;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .cart-item-thumb {
    width: 56px; height: 56px;
    background: var(--card);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .cart-item-info { flex: 1; min-width: 0; }

  .cart-item-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 400;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cart-item-unit {
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .qty-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .qty-btn {
    width: 24px; height: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.1s;
    flex-shrink: 0;
  }

  .qty-btn:hover { border-color: var(--accent); color: var(--accent); }

  .qty-value {
    font-size: 0.85rem;
    font-weight: 500;
    min-width: 20px;
    text-align: center;
  }

  .cart-item-total {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    color: var(--accent);
    font-weight: 600;
    align-self: center;
    flex-shrink: 0;
  }

  /* ── Cart Footer ─────────────────────────────────────────────────── */
  .cart-footer {
    padding: 24px 32px 32px;
    border-top: 1px solid var(--border);
  }

  .cart-summary { margin-bottom: 20px; }

  .summary-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--muted);
    padding: 4px 0;
  }

  .summary-row.total {
    font-size: 1rem;
    color: var(--text);
    font-weight: 600;
    padding-top: 12px;
    margin-top: 8px;
    border-top: 1px solid var(--border);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
  }

  .summary-row.total span:last-child { color: var(--accent); }

  .btn-checkout {
    width: 100%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-checkout:hover { opacity: 0.85; }
  .btn-checkout:disabled { opacity: 0.4; cursor: not-allowed; }

  .persist-note {
    text-align: center;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 12px;
  }

  /* ── Toast ───────────────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 12px 28px;
    font-size: 0.82rem;
    letter-spacing: 0.5px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .cart-panel { border-top: 1px solid var(--border); }
    .products-section { padding: 32px 24px; border-right: none; }
    header { padding: 0 24px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">AU<span>·</span>RA</div>
  <button class="cart-btn" onclick="scrollToCart()">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/>
      <path d="M16 10a4 4 0 01-8 0"/>
    </svg>
    Cart
    <span class="cart-count" id="cartCount">0</span>
  </button>
</header>

<div class="layout">
  <!-- Products -->
  <div class="products-section">
    <div class="section-header">
      <h2 class="section-title">New <em>Collection</em></h2>
      <span class="item-count" id="itemCount">6 pieces</span>
    </div>
    <div class="products-grid" id="productsGrid"></div>
  </div>

  <!-- Cart -->
  <div class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <h2 class="cart-title">Your Cart</h2>
      <button class="btn-clear" onclick="clearCart()">Remove all</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-summary" id="cartSummary"></div>
      <button class="btn-checkout" id="checkoutBtn" onclick="checkout()" disabled>
        Checkout
      </button>
      <p class="persist-note">🔒 Cart saved to localStorage</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ─── Storage Helpers ──────────────────────────────────────────────
  function saveToStorage(key, data) {
    localStorage.setItem(key, JSON.stringify(data));
  }

  function getFromStorage(key, defaultValue = null) {
    const data = localStorage.getItem(key);
    return data ? JSON.parse(data) : defaultValue;
  }

  // ─── State ────────────────────────────────────────────────────────
  const state = {
    products: [
      { id: 1, name: 'Obsidian Watch',     category: 'Accessories', price: 340, emoji: '⌚', description: 'Matte black case, sapphire crystal', badge: 'New' },
      { id: 2, name: 'Linen Blazer',       category: 'Apparel',     price: 195, emoji: '🥻', description: 'Relaxed fit, natural linen weave', badge: null },
      { id: 3, name: 'Cedar Candle',       category: 'Home',        price: 48,  emoji: '🕯️', description: '60hr burn, hand poured in Oslo', badge: 'Popular' },
      { id: 4, name: 'Noise-Cancel Buds',  category: 'Audio',       price: 289, emoji: '🎧', description: '40h battery, hybrid ANC', badge: null },
      { id: 5, name: 'Leather Wallet',     category: 'Accessories', price: 85,  emoji: '👛', description: 'Full-grain, 6 card slots', badge: null },
      { id: 6, name: 'Merino Beanie',      category: 'Apparel',     price: 55,  emoji: '🧢', description: '100% extra-fine merino wool', badge: 'New' },
    ],
    cart: getFromStorage('aura_cart', [])  // Persist cart!
  };

  // ─── Cart CRUD ────────────────────────────────────────────────────
  function addToCart(productId) {
    const existing = state.cart.find(item => item.productId === productId);

    if (existing) {
      existing.quantity++;
    } else {
      state.cart.push({ productId, quantity: 1 });
    }

    saveCart();
    render();
    bumpCartCount();
    const product = state.products.find(p => p.id === productId);
    showToast(`${product.name} added to cart`);
  }

  function updateQuantity(productId, quantity) {
    if (quantity <= 0) {
      removeFromCart(productId);
      return;
    }
    const item = state.cart.find(i => i.productId === productId);
    if (item) {
      item.quantity = quantity;
      saveCart();
      render();
    }
  }

  function removeFromCart(productId) {
    state.cart = state.cart.filter(i => i.productId !== productId);
    saveCart();
    render();
  }

  function clearCart() {
    if (!state.cart.length) return;
    state.cart = [];
    saveCart();
    render();
    showToast('Cart cleared');
  }

  function saveCart() {
    saveToStorage('aura_cart', state.cart);
  }

  // ─── Computed ─────────────────────────────────────────────────────
  function getCartCount() {
    return state.cart.reduce((sum, item) => sum + item.quantity, 0);
  }

  function getCartSubtotal() {
    return state.cart.reduce((sum, item) => {
      const product = state.products.find(p => p.id === item.productId);
      return sum + product.price * item.quantity;
    }, 0);
  }

  function getProduct(id) {
    return state.products.find(p => p.id === id);
  }

  // ─── Render ───────────────────────────────────────────────────────
  function render() {
    renderProducts();
    renderCart();
  }

  function renderProducts() {
    const grid = document.getElementById('productsGrid');
    const cartIds = new Set(state.cart.map(i => i.productId));

    grid.innerHTML = state.products.map(p => {
      const inCart = cartIds.has(p.id);
      const cartItem = state.cart.find(i => i.productId === p.id);
      return `
        <div class="product-card">
          <div class="product-image">
            <span>${p.emoji}</span>
            ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
          </div>
          <div class="product-info">
            <p class="product-category">${p.category}</p>
            <h3 class="product-name">${p.name}</h3>
            <p class="product-description">${p.description}</p>
            <div class="product-footer">
              <span class="product-price">$${p.price}</span>
              <button class="btn-atc ${inCart ? 'in-cart' : ''}"
                onclick="addToCart(${p.id})">
                ${inCart ? `In Cart (${cartItem.quantity})` : 'Add to Cart'}
              </button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function renderCart() {
    const cartEl = document.getElementById('cartItems');
    const countEl = document.getElementById('cartCount');
    const summaryEl = document.getElementById('cartSummary');
    const checkoutBtn = document.getElementById('checkoutBtn');

    const count = getCartCount();
    countEl.textContent = count;

    if (!state.cart.length) {
      cartEl.innerHTML = `
        <div class="cart-empty">
          <span class="icon">🛍️</span>
          <p>Your cart is empty</p>
          <small>Add items from the collection</small>
        </div>`;
      summaryEl.innerHTML = '';
      checkoutBtn.disabled = true;
      return;
    }

    checkoutBtn.disabled = false;

    cartEl.innerHTML = state.cart.map(item => {
      const p = getProduct(item.productId);
      return `
        <div class="cart-item">
          <div class="cart-item-thumb">${p.emoji}</div>
          <div class="cart-item-info">
            <p class="cart-item-name">${p.name}</p>
            <p class="cart-item-unit">$${p.price} each</p>
            <div class="qty-row">
              <button class="qty-btn" onclick="updateQuantity(${p.id}, ${item.quantity - 1})">−</button>
              <span class="qty-value">${item.quantity}</span>
              <button class="qty-btn" onclick="updateQuantity(${p.id}, ${item.quantity + 1})">+</button>
            </div>
          </div>
          <span class="cart-item-total">$${p.price * item.quantity}</span>
        </div>
      `;
    }).join('');

    const subtotal = getCartSubtotal();
    const shipping = subtotal > 200 ? 0 : 12;
    const total = subtotal + shipping;

    summaryEl.innerHTML = `
      <div class="summary-row">
        <span>Subtotal (${count} item${count !== 1 ? 's' : ''})</span>
        <span>$${subtotal}</span>
      </div>
      <div class="summary-row">
        <span>Shipping</span>
        <span>${shipping === 0 ? '<span style="color:var(--green)">Free</span>' : '$' + shipping}</span>
      </div>
      <div class="summary-row total">
        <span>Total</span>
        <span>$${total}</span>
      </div>
    `;
  }

  // ─── UI Extras ────────────────────────────────────────────────────
  function bumpCartCount() {
    const el = document.getElementById('cartCount');
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
  }

  function checkout() {
    showToast(`Order placed! Total: $${getCartSubtotal() + (getCartSubtotal() > 200 ? 0 : 12)} 🎉`);
    state.cart = [];
    saveCart();
    setTimeout(render, 400);
  }

  function scrollToCart() {
    document.getElementById('cartPanel').scrollIntoView({ behavior: 'smooth' });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ─── Init ─────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
